AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: AI DevOps Agent — CI failure analyzer with Slack alerts and DynamoDB history

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: nodejs20.x
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

Resources:
  # ─── DynamoDB Table ───────────────────────────────────────────────────────────
  CiFailuresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ci-failures
      BillingMode: PAY_PER_REQUEST   # no provisioned capacity — pay only for what you use
      AttributeDefinitions:
        - AttributeName: repo
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: repo        # partition key — all failures for a repo together
          KeyType: HASH
        - AttributeName: timestamp   # sort key — query by time range
          KeyType: RANGE

  # ─── Lambda Function ──────────────────────────────────────────────────────────
  AiDevOpsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-devops-agent
      Handler: src/lambda.handler
      CodeUri: .
      Description: Analyzes GitHub CI failures and sends Slack alerts
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "ai-devops-agent/*"
        - DynamoDBCrudPolicy:             # grants read/write to the table
            TableName: !Ref CiFailuresTable
      Events:
        CiFailureWebhook:
          Type: Api
          Properties:
            Path: /ci-failure
            Method: POST
        HealthCheck:
          Type: Api
          Properties:
            Path: /health
            Method: GET
        Stats:
          Type: Api
          Properties:
            Path: /stats
            Method: GET

Outputs:
  WebhookUrl:
    Description: "Your public webhook URL — set this as AI_AGENT_URL in GitHub Secrets"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"