AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: AI DevOps Agent — CI failure analyzer with Slack alerts

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: nodejs18.x
    Environment:
      Variables:
        # Secrets are fetched at runtime from SSM inside src/secrets.js
        # Only the region is needed here so the SSM client knows where to look
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

Resources:
  AiDevOpsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-devops-agent
      Handler: src/lambda.handler
      CodeUri: .
      Description: Analyzes GitHub CI failures and sends Slack alerts
      Policies:
        # Grant Lambda permission to read SSM parameters
        - SSMParameterReadPolicy:
            ParameterName: "ai-devops-agent/*"
      Events:
        CiFailureWebhook:
          Type: Api
          Properties:
            Path: /ci-failure
            Method: POST
        HealthCheck:
          Type: Api
          Properties:
            Path: /health
            Method: GET

Outputs:
  WebhookUrl:
    Description: "Your public webhook URL — set this as AI_AGENT_URL in GitHub Secrets"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"