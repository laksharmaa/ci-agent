name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      # ✅ This step only runs when any previous step FAILS
      - name: Notify AI Agent on Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.AI_AGENT_URL }}/ci-failure \
          -H "Content-Type: application/json" \
          -H "x-agent-secret: ${{ secrets.AGENT_SECRET }}" \
          -d '{
            "repo": "${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}"
          }'